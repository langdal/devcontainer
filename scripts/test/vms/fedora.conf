# Fedora 41 cloud image — SELinux enforcing in CI matrix.
# POST_BOOT_CMDS forces enforcing mode via cloud-init runcmd (rather than
# kernel cmdline) because the launcher boots from a disk image — there's
# no -kernel passed to QEMU, so -append would be silently ignored.
# Archive URL is geo-stable: download.fedoraproject.org returns a 302 to
# whichever mirror is closest, and not every mirror carries the -1.4
# minor (GitHub Actions runners in Azure get bounced to mirrors that
# 404). archives.fedoraproject.org serves the file directly.
IMAGE_URL="https://archives.fedoraproject.org/pub/archive/fedora/linux/releases/41/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-41-1.4.x86_64.qcow2"
IMAGE_SHA256="6205ae0c524b4d1816dbd3573ce29b5c44ed26c9fbc874fbe48c41c89dd0bac2"
CLOUD_USER="fedora"
PACKAGES="docker docker-buildx podman jq rsync iptables-nft"
PACKAGE_INSTALL_CMD="dnf install -y --setopt=install_weak_deps=False"
POST_BOOT_CMDS="sed -i 's/^SELINUX=.*/SELINUX=enforcing/' /etc/selinux/config && setenforce 1 || true"
