# Ubuntu 24.04 LTS cloud image — happy-path baseline.
# Ubuntu 23.10+ ships kernel.apparmor_restrict_unprivileged_userns=1 which
# blocks rootless DinD. Most --dind scenarios assume sysctl=0; scenario 15
# explicitly sets it to 1 via snapshot/restore. Set the baseline to 0 here.
IMAGE_URL="https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
IMAGE_SHA256="53fdde898feed8b027d94baa9cfe8229867f330a1d9c49dc7d84465ee7f229f7"
CLOUD_USER="ubuntu"
PACKAGES="docker.io docker-buildx podman jq rsync"
PACKAGE_INSTALL_CMD="apt-get install -y --no-install-recommends"
POST_BOOT_CMDS="sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true"
