name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run lint
        run: bash scripts/lint.sh

  vm-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora, debian, ubuntu]
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils \
            openssh-client rsync

      - name: Enable KVM
        # ubuntu-24.04 runners expose /dev/kvm but the 'runner' user is not in
        # the kvm group, so `[ -w /dev/kvm ]` returns false and detect_accel
        # falls through to TCG (~10× slower; full DinD suite ~4 hours instead
        # of ~25 min). The udev rule below makes /dev/kvm world-rw so the
        # rule survives device respawn between matrix cells.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm-for-runner.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          if [ -w /dev/kvm ]; then
            echo "KVM available: $(ls -l /dev/kvm)"
          else
            echo "KVM still NOT writable; falling back to TCG (slow)."
            ls -l /dev/kvm || true
          fi

      - name: Restore image cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/devcontainer-ci/images/${{ matrix.distro }}
          key: vm-image-${{ matrix.distro }}-${{ hashFiles(format('scripts/test/vms/{0}.conf', matrix.distro)) }}

      - name: Run suite in ${{ matrix.distro }} VM
        run: bash scripts/test/run-in-vm.sh ${{ matrix.distro }}

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.distro }}
          path: |
            scripts/test/last-run-${{ matrix.distro }}.log
            scripts/test/last-summary-${{ matrix.distro }}.log
            scripts/test/serial-${{ matrix.distro }}.log
            scripts/test/cloud-init-output-${{ matrix.distro }}.log
          if-no-files-found: ignore
